<!DOCTYPE html>
<html lang="en">
<head>

    <title>Chill Register</title>

    <link rel="stylesheet" href="./css/style-regis.css">

<body>

    <div class="overlay"></div>

    <div class="container">

        <div class="login-card">

            <div class="logo">
                <img src="./asset/logo.png" alt="Logo" class="logo-image">
            </div>

            <h2>Buat Akun</h2>

            <form>

                <div class="input-box">
                    <input type="text" placeholder="Masukan Username" required id="name">
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Masukan Password" required id="ttl">
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Konfirmasi Password" required id="password">
                </div>

                <button type="submit">
                    Buat Akun
                </button>

            </form>

            <div class="divider">
                <span>or</span>
            </div>
