<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub Login</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay"></div>

    <div class="container">

        <div class="login-card">

            <div class="logo">
                <h1>APP <span>STREAMING</span></h1>
            </div>

            <h2>Welcome</h2>
            <p class="subtitle">
                Sign in and continue watching your favorite movies.
            </p>

            <form>

                <div class="input-box">
                    <input type="email" placeholder="Email Address" required>
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                </div>

                <div class="options">
                    <label>
                        <input type="checkbox">
                        Remember Me
                    </label>

                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit">
                    Sign In
                </button>

            </form>

            <div class="divider">
                <span>or</span>
            </div>
            <p class="register">
                Don't have an account?
                <a href="#">Register Now</a>
            </p>

        </div>

    </div>

</body>
</html>
